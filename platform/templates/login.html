{% extends "base.html" %}
{% block title %}Sign in to SunCredit{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2">
        <div class="w-12 h-12 rounded-2xl gradient-navy flex items-center justify-center shadow-lg"><i class="fa-solid fa-sun text-emerald2 text-xl"></i></div>
      </a>
      <h1 class="mt-4 text-2xl font-extrabold text-navy">Welcome back</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to manage your loan.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-7">
      <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-slate-600">Email</label>
          <input name="email" type="email" required autofocus class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-emerald2/30 focus:border-emerald2 outline-none">
        </div>
        <div>
          <div class="flex justify-between items-baseline">
            <label class="text-xs font-semibold text-slate-600">Password</label>
            <a href="#" class="text-xs text-emerald2 hover:underline">Forgot password?</a>
          </div>
          <input name="password" type="password" required class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-emerald2/30 focus:border-emerald2 outline-none">
        </div>
        <button class="w-full bg-navy hover:bg-navy-700 text-white font-bold py-3 rounded-xl shadow-md mt-2">Sign in</button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-600 mt-5">
      New to SunCredit? <a href="{{ url_for('register') }}" class="text-emerald2 font-semibold hover:underline">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
