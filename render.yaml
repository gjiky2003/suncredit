services:
  - type: web
    name: suncredit
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --preload"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@suncredit.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
